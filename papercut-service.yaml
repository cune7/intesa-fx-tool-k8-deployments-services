apiVersion: v1
kind: Service
metadata:
  name: intesa-fx-papercut-smtp
  namespace: fx-tool
spec:
  selector:
    app: intesa-fx-papercut-smtp
  ports:
    - name: web
      protocol: TCP
      port: 8082
      targetPort: 8080
    - name: smtp
      protocol: TCP
      port: 2525
      targetPort: 2525
  type: ClusterIP
